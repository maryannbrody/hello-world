<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyDevoted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #F04B24;
  --red-dark: #D43E1A;
  --red-light: #FBF0EB;
  --purple: #592C82;
  --purple-light: #ECE4F1;
  --blue: #00A0DD;
  --blue-light: #D4E7F7;
  --charcoal: #1D252C;
  --gray-text: #595959;
  --gray-bg: #F8F7F5;
  --bg-input: #F2EFEA;
  --gray-mid: #E0DBD5;
  --border-warm: #E8E3DE;
  --white: #FFFFFF;
  --taupe: #f9f5f2;
  --amber: #B45309;
  --green: #166534;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Public Sans', sans-serif;
  font-size: 17px;
  line-height: 1.7;
  color: var(--charcoal);
  background: var(--gray-bg);
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* ── Gate screen ── */
#gate {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 24px;
  text-align: center;
  font-size: 17px;
  color: var(--gray-text);
}

/* ── App shell ── */
#app {
  display: none;
  flex-direction: column;
  height: 100%;
}
#app.active { display: flex; }

/* ── Status bar (mobile only) ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 54px;
  padding: 0 24px;
  background: var(--gray-bg);
  font-size: 15px;
  font-weight: 600;
  flex-shrink: 0;
}
.status-bar-left { font-variant-numeric: tabular-nums; }
.status-bar-right { display: flex; align-items: center; gap: 6px; }
.status-bar-right svg { width: 18px; height: 18px; }

@media (min-width: 768px) {
  .status-bar { display: none; }
}

/* ── App header ── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  height: 56px;
  background: var(--white);
  border-bottom: 1px solid var(--border-warm);
  flex-shrink: 0;
  padding: 0 16px;
}
.app-header .logo-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.app-header .logo-wrap svg { height: 28px; width: auto; }
.app-header .profile-btn {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 50%;
}
.app-header .profile-btn:active { background: var(--bg-input); }
.app-header .profile-btn svg { width: 28px; height: 28px; color: var(--charcoal); }

/* ── Content area ── */
.content-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.tab-view { display: none; padding: 24px 20px 24px; min-height: 100%; }
.tab-view.active { display: block; }

/* ── AI bar ── */
.ai-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px 10px;
  background: var(--white);
  border-top: 1px solid var(--border-warm);
  flex-shrink: 0;
}
.ai-bar.hidden { display: none; }
.ai-bar-pill {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-input);
  border: 1.5px solid var(--border-warm);
  border-radius: 9999px;
  padding: 0 16px;
  height: 48px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.ai-bar-pill:focus-within {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(240, 75, 36, 0.12);
}
.ai-bar-pill svg { width: 20px; height: 20px; color: #999; flex-shrink: 0; }
.ai-bar-pill input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: 'Public Sans', sans-serif;
  font-size: 17px;
  color: var(--charcoal);
  min-width: 0;
}
.ai-bar-pill input::placeholder { color: #999; }
.ai-bar-send {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--red);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}
.ai-bar-send:active { background: var(--red-dark); }
.ai-bar-send svg { width: 20px; height: 20px; color: var(--white); }

/* ── Bottom tab bar ── */
.tab-bar {
  display: flex;
  align-items: stretch;
  background: var(--white);
  border-top: 1px solid var(--border-warm);
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.tab-bar-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 8px 0 8px;
  min-height: 56px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: 'Public Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: #999;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tab-bar-item.active { color: var(--red); }
.tab-bar-item svg { width: 26px; height: 26px; }
.tab-bar-item span { font-size: 14px; }
</style>
</head>
<body>

<!-- Gate: no API key -->
<div id="gate">Please use the link provided to access MyDevoted.</div>

<!-- App shell -->
<div id="app">
  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-bar-left">9:41</div>
    <div class="status-bar-right">
      <!-- Signal -->
      <svg viewBox="0 0 18 14" fill="none"><rect x="0" y="10" width="3" height="4" rx="0.5" fill="currentColor"/><rect x="5" y="7" width="3" height="7" rx="0.5" fill="currentColor"/><rect x="10" y="3.5" width="3" height="10.5" rx="0.5" fill="currentColor"/><rect x="15" y="0" width="3" height="14" rx="0.5" fill="currentColor"/></svg>
      <!-- WiFi -->
      <svg viewBox="0 0 18 18" fill="none"><path d="M9 14a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm-4.24-3.18a6.5 6.5 0 018.48 0l-1.06 1.06a5 5 0 00-6.36 0l-1.06-1.06zm-2.83-2.83a10 10 0 0114.14 0l-1.06 1.06a8.5 8.5 0 00-12.02 0L1.93 7.99z" fill="currentColor"/></svg>
      <!-- Battery -->
      <svg viewBox="0 0 28 14" fill="none"><rect x="0.5" y="0.5" width="23" height="13" rx="2" stroke="currentColor" fill="none"/><rect x="2" y="2" width="20" height="10" rx="1" fill="currentColor"/><path d="M25 4.5v5a2 2 0 000-5z" fill="currentColor"/></svg>
    </div>
  </div>

  <!-- App header -->
  <header class="app-header">
    <div class="logo-wrap">
      <!-- Devoted Health logo mark -->
      <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="35" r="18" fill="#F04B24"/>
        <circle cx="34" cy="60" r="16" fill="#592C82"/>
        <circle cx="66" cy="60" r="16" fill="#00A0DD"/>
      </svg>
      <!-- Wordmark -->
      <svg height="20" viewBox="0 0 330 60" fill="none">
        <text x="0" y="46" font-family="Libre Franklin, sans-serif" font-weight="700" font-size="48" fill="#1D252C">Devoted</text>
      </svg>
    </div>
    <button class="profile-btn" aria-label="Profile" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0112 0v1"/></svg>
    </button>
  </header>

  <!-- Content area -->
  <main class="content-area">
    <div id="tab-home" class="tab-view active"></div>
    <div id="tab-health" class="tab-view"></div>
    <div id="tab-benefits" class="tab-view"></div>
    <div id="tab-profile" class="tab-view"></div>
  </main>

  <!-- AI bar -->
  <div class="ai-bar" id="aiBar">
    <div class="ai-bar-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.49"/></svg>
      <input type="text" id="aiBarInput" placeholder="">
    </div>
    <button class="ai-bar-send" aria-label="Send" onclick="handleAiBarSend()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <!-- Bottom tab bar -->
  <nav class="tab-bar">
    <button class="tab-bar-item active" data-tab="home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg>
      <span>Home</span>
    </button>
    <button class="tab-bar-item" data-tab="health" onclick="switchTab('health')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z"/></svg>
      <span>Health</span>
    </button>
    <button class="tab-bar-item" data-tab="benefits" onclick="switchTab('benefits')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      <span>Benefits</span>
    </button>
    <button class="tab-bar-item" data-tab="chat" onclick="openChatTab()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span>Chat</span>
    </button>
  </nav>
</div>

<script>
// ── API key gate ──
const apiKey = new URLSearchParams(window.location.search).get('k');
if (apiKey) {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').classList.add('active');
}

// ── Tab switching ──
let currentTab = 'home';

const aiBarPlaceholders = {
  home: '',
  health: 'Ask about your health...',
  benefits: 'Ask about your benefits...',
  profile: 'Help me to...'
};

function switchTab(tab) {
  currentTab = tab;

  // Update tab views
  document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
  const target = document.getElementById('tab-' + tab);
  if (target) target.classList.add('active');

  // Update tab bar active state
  document.querySelectorAll('.tab-bar-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });

  // AI bar visibility & placeholder
  const aiBar = document.getElementById('aiBar');
  const aiInput = document.getElementById('aiBarInput');
  if (tab === 'home') {
    aiBar.classList.add('hidden');
  } else {
    aiBar.classList.remove('hidden');
    aiInput.placeholder = aiBarPlaceholders[tab] || '';
  }
}

function openChatTab() {
  // Highlight chat tab
  document.querySelectorAll('.tab-bar-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === 'chat');
  });
  openThreadList();
}

function handleAiBarSend() {
  const input = document.getElementById('aiBarInput');
  const text = input.value.trim();
  if (text) {
    openConvSheet(text);
    input.value = '';
  }
}

// ── Stubs for Prompt 2 ──
function openConvSheet(prefill) { console.log('open sheet:', prefill); }
function openThreadList() { console.log('open thread list'); }

// Initialize
switchTab('home');
</script>
</body>
</html>
